<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery | The Scoreboard</title>
    <meta
      name="description"
      content="Explore the atmosphere, food, drinks, pool tables, karaoke nights, and game-day crowd at The Scoreboard."
    />
    <meta name="theme-color" content="#07111d" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="gallery">
    <div data-header></div>
    <main>
      <section class="page-hero">
        <div class="site-shell">
          <h1>The room, the crowd, the game-night feel.</h1>
          <p class="section-lead">
            Use real photos first when they are available. Until then, keep the placeholders clean and easy to
            replace.
          </p>
          <div class="page-actions">
            <a class="button-accent" href="/visit/">Visit</a>
            <a class="button" href="/events/">See Events</a>
            <a class="button-ghost" href="/menu/">View Menu</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="site-shell">
          <div class="panel">
            <div class="panel-header">
              <h3>Filter the set</h3>
              <div class="tag">Placeholder-ready categories</div>
            </div>
            <div class="chips" data-gallery-controls></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="site-shell">
          <div class="gallery-grid" data-gallery-grid></div>
        </div>
      </section>
    </main>
    <div data-footer></div>
    <div data-mobile-cta></div>
    <script type="module" src="/site.js"></script>
    <script type="application/ld+json" data-jsonld>
      {
        "@context": "https://schema.org",
        "@type": ["BarOrPub", "Restaurant"],
        "name": "The Scoreboard",
        "url": "https://scoreboardib.wixsite.com/the-scoreboard",
        "telephone": "+1-619-424-9909",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "951 Palm Ave",
          "addressLocality": "Imperial Beach",
          "addressRegion": "CA",
          "postalCode": "91932",
          "addressCountry": "US"
        }
      }
    </script>
  </body>
</html>
